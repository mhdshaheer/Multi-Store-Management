openapi: 3.0.3

info:
  title: Multi Store Management API
  description: >
    REST API for the Multi Store Management application.
    This API provides authentication, product management,
    store management, stock management, and stock transfer features.
  version: 1.0.0

servers:
  - url: http://localhost:5000/api/v1
    description: Local Development Server

tags:
  - name: Authentication
    description: User authentication APIs

  - name: Products
    description: Product management APIs

  - name: Stores
    description: Store management APIs

  - name: Stocks
    description: Stock management APIs
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ---------- Authentication ----------

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: Password@123

    VerifyOtpRequest:
      type: object
      required:
        - email
        - otp
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        otp:
          type: string
          example: "123456"

    ResendOtpRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: john@example.com

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: Password@123

    User:
      type: object
      properties:
        _id:
          type: string
          example: 6870d3efcb6e8a4f1d123456
        name:
          type: string
          example: John Doe
        email:
          type: string
          example: john@example.com
        role:
          type: string
          enum:
            - USER
            - ADMIN

    # ---------- Product ----------

    ProductRequest:
      type: object
      required:
        - name
        - sku
      properties:
        name:
          type: string
          example: iPhone 15
        sku:
          type: string
          example: ABC109

    Product:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        sku:
          type: string

    # ---------- Store ----------

    StoreRequest:
      type: object
      required:
        - name
        - address
      properties:
        name:
          type: string
          example: Calicut Store
        address:
          type: string
          example: Kozhikode, Kerala

    Store:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        address:
          type: string

    # ---------- Stock ----------

    AddStockRequest:
      type: object
      required:
        - productId
        - storeId
        - quantity
        - threshold
      properties:
        productId:
          type: string
        storeId:
          type: string
        quantity:
          type: integer
          example: 100
        threshold:
           type: integer
           example: 10

    UpdateStockRequest:
      type: object
      required:
        - quantity
        - threshold
      properties:
        quantity:
          type: integer
          example: 50
        threshold:
          type: integer
          example: 5

    TransferStockRequest:
      type: object
      required:
        - productId
        - fromStoreId
        - toStoreId
        - quantity
      properties:
        productId:
          type: string
        fromStoreId:
          type: string
        toStoreId:
          type: string
        quantity:
          type: integer
          example: 10

    Stock:
      type: object
      properties:
        _id:
          type: string
        productId:
          type: string
        storeId:
          type: string
        quantity:
          type: integer
        threshold:
          type: integer


    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Something went wrong
  paths:

  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Registers a new user and sends an OTP for email verification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful. OTP sent.
        '400':
          description: Invalid request.
        '409':
          description: User already exists.

  /auth/verify:
    post:
      tags:
        - Authentication
      summary: Verify OTP
      description: Verifies the OTP sent to the user's email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          description: Account verified successfully.
        '400':
          description: Invalid or expired OTP.

  /auth/resend:
    post:
      tags:
        - Authentication
      summary: Resend OTP
      description: Sends a new OTP to the registered email address.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendOtpRequest'
      responses:
        '200':
          description: OTP resent successfully.
        '404':
          description: User not found.

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login
      description: Authenticates the user and returns an access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful.
        '401':
          description: Invalid email or password.

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout
      description: Logs out the current user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful.
        '401':
          description: Unauthorized.

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get Current User
      description: Returns the currently authenticated user's information.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User details retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized.
  /products:
    post:
      tags:
        - Products
      summary: Create a product
      description: Creates a new product. Only administrators can perform this operation.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '201':
          description: Product created successfully.
        '400':
          description: Invalid request.
        '401':
          description: Unauthorized.
        '403':
          description: Admin access required.

    get:
      tags:
        - Products
      summary: Get all products
      description: Returns a list of all products.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Products retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '401':
          description: Unauthorized.
        '403':
          description: Admin access required.

  /products/{id}:
    put:
      tags:
        - Products
      summary: Update a product
      description: Updates an existing product by its ID.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '200':
          description: Product updated successfully.
        '400':
          description: Invalid request.
        '401':
          description: Unauthorized.
        '403':
          description: Admin access required.
        '404':
          description: Product not found.

  /stores:
    post:
      tags:
        - Stores
      summary: Create a store
      description: Creates a new store. Only administrators can perform this operation.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreRequest'
      responses:
        '201':
          description: Store created successfully.
        '400':
          description: Invalid request.
        '401':
          description: Unauthorized.
        '403':
          description: Admin access required.

    get:
      tags:
        - Stores
      summary: Get all stores
      description: Returns a list of all available stores.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Stores retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Store'
        '401':
          description: Unauthorized.

  /stores/{storeId}:
    get:
      tags:
        - Stores
      summary: Get store by ID
      description: Returns details of a specific store.
      security:
        - bearerAuth: []
      parameters:
        - name: storeId
          in: path
          required: true
          description: Store ID
          schema:
            type: string
      responses:
        '200':
          description: Store retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'
        '401':
          description: Unauthorized.
        '404':
          description: Store not found.
  /stores:
    post:
      tags:
        - Stores
      summary: Create a store
      description: Creates a new store. Only administrators can perform this operation.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreRequest'
      responses:
        '201':
          description: Store created successfully.
        '400':
          description: Invalid request.
        '401':
          description: Unauthorized.
        '403':
          description: Admin access required.

    get:
      tags:
        - Stores
      summary: Get all stores
      description: Returns a list of all available stores.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Stores retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Store'
        '401':
          description: Unauthorized.

  /stores/{storeId}:
    get:
      tags:
        - Stores
      summary: Get store by ID
      description: Returns details of a specific store.
      security:
        - bearerAuth: []
      parameters:
        - name: storeId
          in: path
          required: true
          description: Store ID
          schema:
            type: string
      responses:
        '200':
          description: Store retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'
        '401':
          description: Unauthorized.
        '404':
          description: Store not found.
