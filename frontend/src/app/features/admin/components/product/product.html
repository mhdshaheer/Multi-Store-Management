<div class="page">
  <div class="page-header">
    <div>
      <h2>Products</h2>
      <p>Manage all products</p>
    </div>

    <button class="create-btn" (click)="openCreate()">+ Create Product</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>SKU</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      @for (product of products; track product._id) {
        <tr>
          <td>{{ product.name }}</td>

          <td>{{ product.sku }}</td>

          <td>
            <button class="edit-btn" (click)="openEdit(product)">Edit</button>
          </td>
        </tr>
      }
    </tbody>
  </table>

  <div class="pagination">
    <button>Previous</button>

    <button class="active">1</button>

    <button>2</button>

    <button>3</button>

    <button>Next</button>
  </div>
</div>

@if (showModal) {
  <div class="overlay">
    <div class="modal">
      <h3>
        {{ isEdit ? 'Edit Product' : 'Create Product' }}
      </h3>

      <div class="field">
        <label>Name</label>

        <input [(ngModel)]="currentProduct.name" />
      </div>

      <div class="field">
        <label>SKU</label>

        <input [(ngModel)]="currentProduct.sku" />
      </div>

      <div class="actions">
        <button class="cancel" (click)="closeModal()">Cancel</button>

        <button class="save" (click)="saveProduct()">Save</button>
      </div>
    </div>
  </div>
}
